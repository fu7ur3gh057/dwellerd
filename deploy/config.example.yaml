# Dwellerd config (full schema after Phase 3).
#
# Path conventions:
#   Production install (systemd):
#     config:    /etc/dwellerd/config.yaml      (root:dwellerd 640)
#     data_dir:  /var/lib/dwellerd/data         (dwellerd:dwellerd 750)
#     logs_dir:  /var/lib/dwellerd/logs         (dwellerd:dwellerd 750)
#   Dev mode (`make run` from your shell):
#     config:    ./config.yaml
#     data_dir:  ./data
#     logs_dir:  ./logs
#
# After first boot, the YAML's notifiers/checks/report/logs blocks are
# imported into the SQLite `settings` table and become editable via the
# admin UI. The YAML stays as the boot-time seed + escape hatch (db.path,
# web.host/port/jwt/prefix). Boot-only sections never sync back from the DB.

notifiers: []
  # - type: telegram
  #   bot_token: "123456:ABC..."
  #   chat_id: "-100..."
  #   lang: ru          # ru | en

checks: []
