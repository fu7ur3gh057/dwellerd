# SQLite path override. Default: <data_dir>/dwellerd.sqlite — auto-resolves
# to /var/lib/dwellerd/data/dwellerd.sqlite when config is in /etc/dwellerd/,
# or ./data/dwellerd.sqlite in dev mode.
# db:
#   path: /var/lib/dwellerd/data/dwellerd.sqlite

# Web client (Phase 4)
web:
  enabled: false
  # host: 0.0.0.0
  # port: 8765
  # prefix: /dwellerd
  # jwt:
  #   secret: "..."           # required for auth — generate with `openssl rand -hex 32`
  # user:                     # first-admin seed; consumed once into `users` table
  #   username: admin
  #   password_hash: "$2b$..."
  # terminal:
  #   enabled: false          # in-browser shell (sensitive — see TerminalAuditEntry)
